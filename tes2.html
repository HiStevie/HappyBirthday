<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A New Chapter - Birthday Card</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --book-height: 460px;
            --book-width: 300px;
        }

        @media (min-width: 768px) {
            :root {
                --book-height: 580px;
                --book-width: 400px;
            }
        }

        body {
            background-color: #0c0a09;
            touch-action: manipulation;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* Essential for 3D visibility */
        .perspective-container {
            perspective: 2500px;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* The Main Container that moves to center the spine */
        .book-anchor {
            position: relative;
            width: var(--book-width);
            height: var(--book-height);
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            /* Reset origin to left so we can pivot the whole book group easily */
            transform-origin: center left; 
        }

        /* CLOSED STATE: Centered on screen, floating */
        .book-anchor.closed {
            transform: translateX(0px);
        }

        /* OPEN STATE: Shift right by 50% width to center the spine */
        .book-anchor.opened {
            /* Mobile: Scale down significantly + translate right */
            transform: translateX(45%) scale(0.6); 
        }

        @media (min-width: 768px) {
            .book-anchor.opened {
                /* Desktop: Full size + translate right */
                transform: translateX(50%) scale(1);
            }
        }

        /* The actual book visuals */
        .book-visuals {
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            position: relative;
        }

        /* Floating Animation - Only applied when closed */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

        /* The Flipping Cover */
        .book-cover-flip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transform-origin: left center;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        .opened .book-cover-flip {
            transform: rotateY(-180deg);
        }

        /* Faces */
        .face {
            backface-visibility: hidden;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 4px 8px 8px 4px;
        }

        .front-face {
            z-index: 2;
            transform: rotateY(0deg);
        }

        .back-face {
            transform: rotateY(180deg);
            z-index: 1;
            background-color: #fdfbf7;
            box-shadow: inset -15px 0 30px rgba(0,0,0,0.1);
        }

        .static-right-page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-color: #fdfbf7;
            border-radius: 0 8px 8px 0;
            box-shadow: inset 15px 0 30px rgba(0,0,0,0.15), 5px 10px 40px rgba(0,0,0,0.4);
        }

        .leather-texture {
            background-color: #4a2525; 
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.15'/%3E%3C/svg%3E");
            box-shadow: 10px 10px 50px rgba(0,0,0,0.7);
        }

        .gold-text {
            color: #D4AF37;
            background: linear-gradient(45deg, #C5A059 0%, #F8E4B1 50%, #C5A059 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .paper-texture {
            background-color: #fdfbf7;
            background-image: radial-gradient(#e3e1dd 1px, transparent 1px);
            background-size: 20px 20px;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .sparkle {
            animation: sparkle 2.5s infinite;
        }

        .font-handwriting { font-family: 'Great Vibes', cursive; }
        .font-body { font-family: 'Cormorant Garamond', serif; }
        .font-title { font-family: 'Cinzel', serif; }

        .spine-effect {
            position: absolute;
            left: 0;
            top: 0;
            width: 20px;
            height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.4), transparent);
            z-index: 20;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-stone-950 text-stone-800">

    <div id="root" class="w-full h-full"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Sparkles = () => {
            const [sparkles, setSparkles] = useState([]);
            useEffect(() => {
                const count = 15;
                const newSparkles = Array.from({ length: count }).map((_, i) => ({
                    id: i,
                    left: Math.random() * 100 + '%',
                    top: Math.random() * 100 + '%',
                    delay: Math.random() * 3 + 's',
                    size: Math.random() * 6 + 4 + 'px',
                    color: Math.random() > 0.4 ? '#D4AF37' : '#FFFFFF'
                }));
                setSparkles(newSparkles);
            }, []);

            return (
                <div className="absolute inset-0 pointer-events-none overflow-hidden z-20">
                    {sparkles.map((s) => (
                        <div 
                            key={s.id}
                            className="absolute sparkle"
                            style={{
                                left: s.left,
                                top: s.top,
                                animationDelay: s.delay,
                                width: s.size,
                                height: s.size,
                                color: s.color
                            }}
                        >
                            <i className="fas fa-star" style={{ color: s.color, fontSize: '100%' }}></i>
                        </div>
                    ))}
                </div>
            );
        };

        const BookCard = () => {
            const [isOpen, setIsOpen] = useState(false);

            return (
                <div className="relative w-full h-full flex flex-col items-center justify-center select-none overflow-hidden">
                    {/* Background */}
                    <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center opacity-20"></div>
                    <div className="absolute inset-0 bg-gradient-to-b from-black/60 via-transparent to-black/90"></div>

                    {/* Hint Text */}
                    <div className={`absolute top-10 md:top-16 text-stone-400 font-title transition-opacity duration-700 z-50 text-center px-6 ${isOpen ? 'opacity-0' : 'opacity-100'}`}>
                        <p className="tracking-[0.3em] text-[10px] md:text-sm uppercase mb-1">A gift for the seeker of stories</p>
                        <p className="text-stone-500 italic text-[10px] animate-pulse">Tap to open manuscript</p>
                    </div>

                    <div className="perspective-container">
                        {/* THE ANCHOR: This moves right to center the spine when opened */}
                        <div 
                            className={`book-anchor ${isOpen ? 'opened' : 'closed animate-float'}`}
                            onClick={() => setIsOpen(!isOpen)}
                        >
                            <div className="book-visuals">
                                
                                {/* --- Right Page (Inside Content) --- */}
                                <div className="static-right-page flex flex-col p-6 md:p-12 justify-center border-l border-stone-300">
                                    <div className="absolute top-4 right-6 text-amber-900/10 text-2xl"><i className="fas fa-feather"></i></div>
                                    
                                    <div className="w-full h-full border border-stone-200/60 p-5 md:p-8 relative flex flex-col justify-center shadow-inner rounded-sm bg-white/10">
                                        <div className="absolute top-0 left-0 w-full h-full opacity-5 bg-[url('https://www.transparenttextures.com/patterns/natural-paper.png')]"></div>
                                        
                                        <h3 className="text-xl md:text-3xl font-handwriting text-amber-950 mb-4 md:mb-8 text-center">To the Protagonist,</h3>
                                        
                                        <p className="font-body text-base md:text-xl leading-relaxed text-stone-900 mb-4 indent-4 md:indent-6">
                                            Every year unfolds as a fresh volume, and today you step onto Page One of a brand-new adventure. 
                                        </p>
                                        
                                        <p className="font-body text-base md:text-xl leading-relaxed text-stone-900 indent-4 md:indent-6 mb-8 md:mb-10">
                                            May your story be filled with happiness and joyful twists.
                                        </p>

                                        <div className="text-center mt-auto">
                                            <div className="inline-block border-t border-b border-amber-900/40 py-2 md:py-3 px-4 md:px-6">
                                                <p className="font-title font-bold text-amber-950 tracking-[0.2em] uppercase text-[10px] md:text-sm">Happy Birthday Marie</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="mt-4 text-center text-stone-400 text-[8px] md:text-[10px] font-title tracking-wide opacity-60">
                                        Redeemable at any bookstore.
                                    </div>
                                </div>

                                {/* --- Flipping Cover Section --- */}
                                <div className="book-cover-flip">
                                    
                                    {/* FRONT COVER */}
                                    <div className="face front-face leather-texture border-l-8 border-stone-950 flex flex-col items-center justify-center p-6 md:p-8 relative overflow-hidden">
                                        <div className="absolute inset-4 md:inset-6 border-2 border-yellow-600/20 rounded-sm"></div>

                                        <div className="z-10 text-center flex flex-col items-center">
                                            <span className="text-yellow-600/50 text-[8px] md:text-[10px] font-title tracking-[0.4em] uppercase mb-4">Original Manuscript</span>
                                            <h1 className="text-2xl md:text-5xl font-title font-bold gold-text tracking-wider leading-none">THE<br/>STORY</h1>
                                            <span className="text-yellow-600/70 text-xs md:text-sm font-body italic my-1">of</span>
                                            <h2 className="text-3xl md:text-6xl font-title font-bold gold-text tracking-widest uppercase">Marie</h2>
                                            <div className="w-10 h-0.5 bg-yellow-600/30 my-4 md:my-8 rounded-full"></div>
                                            <div className="font-body italic text-yellow-50/50 text-base md:text-xl">A Birthday Anthology</div>
                                        </div>

                                        <div className="mt-6 md:mt-10 text-5xl md:text-7xl text-yellow-600/50 opacity-80">
                                            <i className="fas fa-book-journal-whills"></i>
                                        </div>

                                        <div className="absolute bottom-6 md:bottom-10 w-full text-center">
                                            <p className="font-title text-[8px] md:text-[10px] text-yellow-600/50 tracking-[0.5em] uppercase">Limited Edition</p>
                                        </div>
                                        <div className="absolute left-0 top-0 w-4 h-full bg-gradient-to-r from-white/10 to-transparent"></div>
                                    </div>

                                    {/* INSIDE LEFT COVER */}
                                    <div className="face back-face border-r border-stone-300 p-6 md:p-12 flex flex-col items-center justify-center">
                                        <div className="absolute inset-0 paper-texture opacity-30"></div>
                                        <div className="border border-stone-300/40 p-4 md:p-8 h-full w-full flex flex-col items-center justify-center text-center relative bg-stone-50/10 shadow-inner">
                                            <div className="mb-4 md:mb-8 opacity-20">
                                                <i className="fas fa-quote-left text-2xl md:text-4xl text-stone-800"></i>
                                            </div>
                                            <p className="font-handwriting text-xl md:text-4xl text-stone-800 leading-snug">
                                                "The world is a book, and those who do not travel another year only read a page."
                                            </p>
                                            <div className="mt-6 md:mt-10 w-10 h-px bg-stone-300"></div>
                                            <div className="absolute bottom-4 text-stone-400 text-[8px] font-title tracking-widest uppercase">Vol. MMXXVI</div>
                                        </div>
                                        <div className="spine-effect"></div>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                    
                    {isOpen && (
                         <div className="absolute bottom-8 md:bottom-12 z-50 flex flex-col items-center">
                            <button 
                                onClick={(e) => { e.stopPropagation(); setIsOpen(false); }}
                                className="px-8 py-3 bg-white/5 text-stone-300 font-title text-[9px] tracking-[0.2em] uppercase rounded-full hover:bg-white/10 transition-all border border-white/20 backdrop-blur-md active:scale-95"
                            >
                                Close Manuscript
                            </button>
                        </div>
                    )}

                    {isOpen && <Sparkles />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BookCard />);
    </script>
</body>
</html>
